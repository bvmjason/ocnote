<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#f0f9ff"/>
  
  <!-- 渐变装饰 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- 标题 -->
  <text x="600" y="280" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" fill="#18181b" text-anchor="middle">
    OpenClaw 饲养日记
  </text>
  
  <!-- 副标题 -->
  <text x="600" y="350" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" fill="#52525b" text-anchor="middle">
    记录 AI 驯养过程中的点点滴滴
  </text>
  
  <!-- 底部装饰线 -->
  <line x1="300" y1="450" x2="900" y2="450" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
  
  <!-- URL -->
  <text x="600" y="520" font-family="'JetBrains Mono', monospace" font-size="24" fill="#0ea5e9" text-anchor="middle">
    ocnote.bvmcreative.com
  </text>
</svg>
